<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: white center fading to blue-lavender at edges -->
    <radialGradient id="bg" cx="100" cy="84" r="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="38%"  stop-color="#ddeefa"/>
      <stop offset="100%" stop-color="#bbadf0"/>
    </radialGradient>

    <!-- Outer ring: cyan-blue → violet -->
    <linearGradient id="rg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7ec6ee"/>
      <stop offset="100%" stop-color="#8f6ee4"/>
    </linearGradient>

    <!-- Left leaf: cyan-blue -->
    <linearGradient id="ll" x1="78" y1="54" x2="42" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#88ccee"/>
      <stop offset="100%" stop-color="#3e94c8"/>
    </linearGradient>

    <!-- Right leaf: violet -->
    <linearGradient id="rl" x1="122" y1="54" x2="158" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#aa90e6"/>
      <stop offset="100%" stop-color="#624ec2"/>
    </linearGradient>

    <!-- Head: sky blue radial -->
    <radialGradient id="hg" cx="42%" cy="36%" r="62%">
      <stop offset="0%"   stop-color="#a4d8f2"/>
      <stop offset="100%" stop-color="#4ea6d8"/>
    </radialGradient>

    <clipPath id="cc"><circle cx="100" cy="100" r="91"/></clipPath>
  </defs>

  <!-- ─── Background ─── -->
  <circle cx="100" cy="100" r="91" fill="url(#bg)"/>

  <!-- ─── Highlight swoosh (white crescent, upper-right) ─── -->
  <path d="M 100 9 Q 158 14 186 62 Q 178 28 148 14 Q 128 6 100 9 Z"
        fill="rgba(255,255,255,0.55)" clip-path="url(#cc)"/>
  <path d="M 14 80 Q 22 38 58 16 Q 28 32 15 68 Z"
        fill="rgba(255,255,255,0.32)" clip-path="url(#cc)"/>

  <!-- ─── Outer ring ─── -->
  <circle cx="100" cy="100" r="91" fill="none"
          stroke="url(#rg)" stroke-width="4.5" opacity="0.68"/>

  <!-- ─── Left leaf (blue) ─── -->
  <path d="M 100 152
           C 96 134  70 124  48  96
           C 30  72  40  52  58  52
           C 72  52  84  72  91  96
           C 96 116  99 134 100 152 Z"
        fill="url(#ll)" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M 100 152 C 78 130 54 104 50 82"
        fill="none" stroke="rgba(255,255,255,0.48)"
        stroke-width="2" stroke-linecap="round"/>

  <!-- ─── Right leaf (violet) ─── -->
  <path d="M 100 152
           C 104 134 130 124 152  96
           C 170  72 160  52 142  52
           C 128  52 116  72 109  96
           C 104 116 101 134 100 152 Z"
        fill="url(#rl)" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M 100 152 C 122 130 146 104 150 82"
        fill="none" stroke="rgba(255,255,255,0.48)"
        stroke-width="2" stroke-linecap="round"/>

  <!-- ─── Head circle ─── -->
  <circle cx="100" cy="60" r="17"
          fill="url(#hg)" stroke="white" stroke-width="3.5"/>
</svg>

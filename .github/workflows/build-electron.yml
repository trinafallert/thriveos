name: Build Electron DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Next.js dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Generate app icon from SVG
        run: |
          mkdir -p electron/build/icons
          brew install librsvg
          rsvg-convert -w 512 -h 512 electron/src/logo.svg -o electron/build/icons/icon.png

      - name: Build macOS DMG
        working-directory: electron
        run: |
          ./node_modules/.bin/electron-builder --mac --x64 --publish never 2>&1 | tee /tmp/eb-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          # Emit last 50 lines as GitHub annotations so we can see them via API
          tail -50 /tmp/eb-build.log | while IFS= read -r line; do
            echo "::notice::$line"
          done
          ls -la dist/ 2>/dev/null && find dist -name "*.dmg" || echo "::error::No dist/ directory found"
          exit $BUILD_EXIT
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          DEBUG: electron-builder

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/eb-build.log

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThriveOS-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error

      - name: Release DMG
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.dmg
          fail_on_unmatched_files: false

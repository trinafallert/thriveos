name: Build Electron DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Next.js dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Generate app icon from SVG
        run: |
          mkdir -p electron/build/icons
          brew install librsvg
          rsvg-convert -w 512 -h 512 electron/src/logo.svg -o electron/build/icons/icon.png

      - name: Build macOS DMG
        working-directory: electron
        run: |
          ./node_modules/.bin/electron-builder --mac --x64 --publish never 2>&1 | tee /tmp/eb-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          # Write full log to step summary
          echo '## electron-builder log' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/eb-build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Dist contents
          echo '## dist/' >> $GITHUB_STEP_SUMMARY
          ls -laR dist/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo '(no dist/)' >> $GITHUB_STEP_SUMMARY
          exit $BUILD_EXIT
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          ELECTRON_BUILDER_SKIP_NOTARIZATION: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/eb-build.log

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThriveOS-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error

      - name: Release DMG
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.dmg
          fail_on_unmatched_files: false

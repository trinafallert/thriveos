name: Build Electron DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Next.js dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Generate app icon from SVG
        run: |
          mkdir -p electron/build/icons
          brew install librsvg
          rsvg-convert -w 512 -h 512 electron/src/logo.svg -o electron/build/icons/icon.png

      - name: Build macOS app bundle
        working-directory: electron
        run: ./node_modules/.bin/electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""

      - name: Create DMG from app bundle
        run: |
          APP_PATH=$(find electron/dist -name "*.app" | head -1)
          echo "App path: $APP_PATH"
          mkdir -p /tmp/dmg-src
          cp -r "$APP_PATH" /tmp/dmg-src/
          hdiutil create \
            -volname "ThriveOS" \
            -srcfolder /tmp/dmg-src \
            -ov -format UDZO \
            -o electron/dist/ThriveOS.dmg
          echo "DMG created:"
          ls -lh electron/dist/ThriveOS.dmg

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/eb-build.log

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThriveOS-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error

      - name: Release DMG
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.dmg
          fail_on_unmatched_files: false

name: Build Electron DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Next.js dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Generate app icon from SVG
        run: |
          mkdir -p electron/build/icons
          brew install librsvg
          rsvg-convert -w 512 -h 512 electron/src/logo.svg -o electron/build/icons/icon.png

      - name: Build macOS app bundles (x64 + arm64)
        working-directory: electron
        run: |
          ./node_modules/.bin/electron-builder --mac --x64 --publish never
          ./node_modules/.bin/electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""

      - name: Ad-hoc sign and create universal DMG
        run: |
          # Sign x64 app
          X64_APP=$(find electron/dist/mac -maxdepth 1 -name "*.app" | head -1)
          ARM64_APP=$(find electron/dist/mac-arm64 -maxdepth 1 -name "*.app" | head -1)
          echo "x64: $X64_APP"
          echo "arm64: $ARM64_APP"

          sign_app() {
            local app="$1"
            find "$app" -name "*.dylib" -exec codesign --force --sign - {} \;
            find "$app" -name "*.so" -exec codesign --force --sign - {} \;
            find "$app/Contents/Frameworks" -maxdepth 1 -mindepth 1 \
              -exec codesign --force --sign - {} \; 2>/dev/null || true
            find "$app/Contents/MacOS" -type f \
              -exec codesign --force --sign - {} \;
            codesign --force --sign - "$app"
          }

          sign_app "$X64_APP"
          sign_app "$ARM64_APP"

          # Create separate DMGs for each arch
          mkdir -p /tmp/dmg-x64 /tmp/dmg-arm64
          cp -r "$X64_APP" /tmp/dmg-x64/
          cp -r "$ARM64_APP" /tmp/dmg-arm64/

          hdiutil create -volname "ThriveOS" -srcfolder /tmp/dmg-x64 \
            -ov -format UDZO -o electron/dist/ThriveOS-x64.dmg
          hdiutil create -volname "ThriveOS" -srcfolder /tmp/dmg-arm64 \
            -ov -format UDZO -o electron/dist/ThriveOS-arm64.dmg

          echo "DMGs created:"
          ls -lh electron/dist/*.dmg

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/eb-build.log

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ThriveOS-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error

      - name: Release DMGs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
